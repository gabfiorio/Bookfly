<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookfly — Perfil</title>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/perfil.css"/>
</head>
<body>

  <nav class="topnav">
    <a href="home.html" class="topnav-brand" title="Início">
      <img src="assets/lirica.png" alt="Bookfly" class="topnav-logo"/>
    </a>
    <div class="topnav-spacer"></div>
    <a href="descobrir.html" class="topnav-icon-btn" title="Descobrir livros">🧭</a>
    <a href="comunidades.html" class="topnav-icon-btn" title="Comunidade">👥</a>
    <a href="busca.html" class="topnav-icon-btn" title="Buscar">🔍</a>
    <a href="notificacoes.html" class="topnav-icon-btn topnav-notif-wrap" title="Notificações">🔔<span class="bf-notif-dot"></span></a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggleBtn">🌙</button>
    <a href="home.html" class="bf-btn bf-btn-ghost" style="font-size:13px;padding:7px 16px;">← Feed</a>
    <button onclick="logout()" class="bf-btn bf-btn-ghost" style="font-size:13px;padding:7px 16px;">Sair</button>
  </nav>

  <div class="page-wrap">

    <div class="profile-header">
      <div class="avatar-wrap">
        <div class="profile-avatar" id="profileAvatar" onclick="triggerAvatarUpload()"></div>
        <div class="avatar-edit-btn" onclick="triggerAvatarUpload()" title="Trocar foto">✏️</div>
        <button id="removeAvatarBtn" class="avatar-remove-btn" onclick="removeAvatar()" style="display:none" title="Remover foto">🗑️</button>
        <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatarChange(event)"/>
      </div>

      <div class="profile-info">
        <div class="profile-name" id="profileName"></div>
        <div class="profile-email" id="profileEmail"></div>
        <div class="profile-bio" id="profileBio"></div>
        <div class="profile-stats">
          <div class="stat-item"><div class="stat-num" id="statLidos">0</div><div class="stat-label">Lidos</div></div>
          <div class="stat-item"><div class="stat-num" id="statLendo">0</div><div class="stat-label">Lendo</div></div>
          <div class="stat-item"><div class="stat-num" id="statQueremLer">0</div><div class="stat-label">Quero ler</div></div>
          <div class="stat-item"><div class="stat-num" id="statSeguidores">0</div><div class="stat-label">Seguidores</div></div>
          <div class="stat-item"><div class="stat-num" id="statSeguindo">0</div><div class="stat-label">Seguindo</div></div>
        </div>
        <div class="profile-actions">
          <a href="avaliar.html" class="bf-btn bf-btn-primary" style="font-size:13px;padding:9px 20px;">⭐ Avaliar livro</a>
          <a href="desafio.html" class="bf-btn bf-btn-ghost"   style="font-size:13px;padding:9px 20px;">🎯 Desafio</a>
          <a href="formulario.html" class="bf-btn bf-btn-ghost" style="font-size:13px;padding:9px 20px;">📝 Refazer formulário</a>
          <button class="bf-btn bf-btn-ghost" style="font-size:13px;padding:9px 20px;" onclick="editProfile()">Editar perfil</button>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('posts', this)">Posts</button>
      <button class="tab-btn" onclick="switchTab('Estantes', this)">📚 Estantes</button>
      <button class="tab-btn" onclick="switchTab('pastas', this)">🗂️ Pastas</button>
    </div>

    <div class="tab-pane" id="tab-avaliados">
      <div class="shelf-grid" id="shelf-avaliados"></div>
      <button class="add-book-btn" onclick="window.location.href='avaliar.html'">+ Avaliar novo livro</button>
    </div>


     <div class="tab-pane" id="tab-Estantes">
      <div class="estantes-toolbar">
        <div class="estantes-mode" role="tablist" aria-label="Tipo de estante">
          <button class="estantes-mode-btn active" onclick="setFolderMode('todas', this)">🗂️ Todas</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="bf-btn bf-btn-primary" onclick="createestantes()">+ Nova estante</button>
          <button class="bf-btn bf-btn-ghost"   onclick="renderEstantes()">Atualizar</button>
        </div>
      </div>
      <div id="estantesGrid"   class="estantes-grid"></div>
      <div id="estantesDetail" class="estantes-detail" style="display:none"></div>
    </div>



    <!-- Pastas tab -->
    <div class="tab-pane" id="tab-pastas">
      <div class="folders-toolbar">
        <div class="folders-mode" role="tablist" aria-label="Tipo de pasta">
          <button class="folder-mode-btn active" onclick="setFolderMode('todas', this)">🗂️ Todas</button>
          <button class="folder-mode-btn" onclick="setFolderMode('genero', this)">📚 Gênero</button>
          <button class="folder-mode-btn" onclick="setFolderMode('autor', this)">✍️ Autor</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="bf-btn bf-btn-primary folders-refresh" onclick="createFolder()">+ Nova pasta</button>
          <button class="bf-btn bf-btn-ghost folders-refresh" onclick="renderFolders()">Atualizar</button>
        </div>
      </div>
      <div id="foldersGrid" class="folders-grid"></div>
      <div id="folderDetail" class="folder-detail" style="display:none"></div>
    </div>


  </div>

  <script src="js/tema.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/covers.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
